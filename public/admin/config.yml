backend:
  name: github
  repo: your-github-user/bhra-website # Replace with actual GitHub repo
  branch: main # Branch to update

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "posts"
    label: "Posts"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Category", name: "category", widget: "select", options: ["Buttonwood Hill Property", "Eglinton West LRT", "Humbertown Plaza", "Richview Square", "La Rose Apartments", "Other Developments", "News", "Uncategorized"]}
      - {label: "Excerpt", name: "excerpt", widget: "string", required: false}
      - {label: "Featured Image", name: "featured_image", widget: "image", required: false}
      - {label: "Attached PDF", name: "attached_pdf", widget: "file", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: false
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "newsletters"
    label: "Newsletters"
    folder: "public/newsletters"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Issue Number", name: "issue", widget: "number"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "PDF File", name: "pdf", widget: "file"}
